name: ci

on:
  push:
  pull_request:

# The release build is CGO-free and cross-compilable; CI enforces the same so a
# CGO-only success can never sneak in. The optional race job below is the one
# documented exception (race needs CGO, linux-only, never a shipped artifact).
env:
  CGO_ENABLED: "0"

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          check-latest: true
      - name: build
        run: go build ./...
      - name: vet
        run: go vet ./...
      - name: gofmt
        run: |
          out="$(gofmt -l .)"
          if [ -n "$out" ]; then echo "unformatted files:"; echo "$out"; exit 1; fi
      - name: test
        run: go test ./...

  # Race detector requires CGO; kept entirely separate from the release build
  # and run on linux only. Never produces a shipped artifact.
  race:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          check-latest: true
      - name: test -race
        env:
          CGO_ENABLED: "1"
        run: go test -race ./...
